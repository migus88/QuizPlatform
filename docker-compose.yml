services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: quizplatform
      POSTGRES_USER: quizplatform
      POSTGRES_PASSWORD: quizplatform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=quizplatform;Username=quizplatform;Password=quizplatform"
      Jwt__Key: "ThisIsASecretKeyForDevelopment1234567890!"
      Jwt__Issuer: "QuizPlatform"
      Jwt__Audience: "QuizPlatform"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://api:8080"
    depends_on:
      - api

volumes:
  pgdata:
